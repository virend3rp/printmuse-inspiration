name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  backend:
    name: Backend (Go)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - name: Build
        working-directory: backend
        run: go build ./cmd/api/

      - name: Test
        working-directory: backend
        run: go test ./...
        env:
          JWT_SECRET: ci-test-secret
          JWT_REFRESH_SECRET: ci-test-refresh-secret

  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8080/api/
          NEXT_PUBLIC_RAZORPAY_KEY_ID: dummy
          NEXT_PUBLIC_S3_BASE_URL: https://example.s3.amazonaws.com

  docker:
    name: Docker builds
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build ./backend --tag printmuse-backend:ci

      - name: Build frontend image
        run: |
          docker build ./frontend \
            --tag printmuse-frontend:ci \
            --build-arg NEXT_PUBLIC_API_URL=http://localhost:8080/api/ \
            --build-arg NEXT_PUBLIC_RAZORPAY_KEY_ID=dummy \
            --build-arg NEXT_PUBLIC_S3_BASE_URL=https://example.s3.amazonaws.com
